name: Branch CI

on:
  push:
    branches-ignore:
      - master

permissions:
  contents: read

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: ruff check code/

  test:
    name: Unit tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install system dependencies
        run: sudo apt-get update -y && sudo apt-get install -y libpq-dev

      - name: Install dependencies
        run: pip install -r app/requirements.txt pytest

      - name: Run pytest
        run: pytest code/tests/

  build:
    name: Docker build (PG ${{ matrix.pg_version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        pg_version: [13, 14, 15, 16, 17, 18]
    env:
      PG_VERSION: ${{ matrix.pg_version }}
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Build containers
        run: docker compose build
